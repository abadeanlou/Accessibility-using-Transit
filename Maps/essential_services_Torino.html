  L.control.layers(hours.length > 1 ? baseLayers : null, overlays, {collapsed: true}).addTo(map);
}

var info = L.control({position: 'topright'});
info.onAdd = function () {
  var d = L.DomUtil.create('div', 'panel');
  d.innerHTML = '<h1>Torino: essential services by transit</h1>Each hexagon: how many schools, healthcare places, supermarkets and markets (OpenStreetMap) are reachable by public transport within 60 minutes at 8:00. Recomputed 2026 from current GTFS. <a href="./">back to all maps</a>';
  return d;
};
info.addTo(map);

var legend = L.control({position: 'bottomright'});
legend.onAdd = function () {
  var d = L.DomUtil.create('div', 'panel legend');
  var html = '<b>Reachable services</b><br>';
  for (var i = 0; i < BREAKS.length - 1; i++) {
    var idx = HIGHER_BETTER ? i : (BREAKS.length - 2 - i);
    html += '<i style="background:' + COLORS[Math.max(0, Math.min(idx, COLORS.length - 1))] + '"></i>' +
            BREAKS[i] + ' &ndash; ' + BREAKS[i + 1] + '<br>';
  }
  d.innerHTML = html;
  return d;
};
legend.addTo(map);
</script>
</body>
</html>
