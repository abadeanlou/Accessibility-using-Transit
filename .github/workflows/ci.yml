name: ci
on:
  push:
    branches: [main]
  pull_request: {}

# The full pipeline needs MongoDB + OSRM; CI covers the standalone
# equity module (pure NumPy).
jobs:
  equity-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy scipy pandas pytest
      - run: pytest tests -v
